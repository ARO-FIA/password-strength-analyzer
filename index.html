<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Password Shield 🛡️</h2>
        <p>Test your password strength below:</p>
        <input type="password" id="password-input" placeholder="Type a password...">
        <div class="meter-container">
            <div id="strength-bar"></div>
        </div>
        <p id="feedback-text">Enter a password to start.</p>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
